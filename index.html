<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Grocery</title>
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>

  <!-- Экран входа -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">🛒</div>
      <h2 class="login-title">Our Grocery</h2>
      <div id="login-step1">
        <p class="login-sub">Выберите пользователя</p>
        <div id="user-list" class="user-list"></div>
      </div>
      <div id="login-step2" class="hidden">
        <div class="selected-user-info">
          <span id="sel-emoji"></span>
          <span id="sel-name"></span>
        </div>
        <div class="password-wrap">
          <input type="password" id="password-input" placeholder="Введите пароль..." />
          <button class="eye-btn" onclick="togglePwdVisibility()">👁</button>
        </div>
        <div id="login-error" class="login-error hidden">Неверный пароль ❌</div>
        <div class="login-step2-btns">
          <button class="back-btn" onclick="backToUsers()">← Назад</button>
          <button class="login-btn" onclick="tryLogin()">Войти →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Модалка редактирования -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Редактировать</h2>
        <button class="modal-close" onclick="closeEdit()">✕</button>
      </div>
      <div class="edit-form">
        <input type="text" id="edit-name" placeholder="Название продукта" />
        <select id="edit-category"></select>
        <div class="edit-qty-row">
          <input type="number" id="edit-qty" min="1" value="1" onfocus="this.select()" />
          <select id="edit-unit"></select>
          <input type="number" id="edit-price" placeholder="Цена ₸" min="0" step="1" onfocus="this.select()" />
        </div>
        <button class="save-edit-btn" onclick="saveEdit()">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Запрос фактических данных при отметке куплено -->
  <div id="price-prompt" class="modal-overlay hidden">
    <div class="modal price-prompt-modal">
      <div class="price-prompt-title">✅ Подтвердите покупку</div>
      <div class="price-prompt-item" id="price-prompt-name"></div>
      <div class="price-prompt-row">
        <label class="pp-label">Количество:</label>
        <input type="number" id="price-prompt-qty" min="0.001" step="any" onfocus="this.select()" />
        <select id="price-prompt-unit"></select>
      </div>
      <div class="price-prompt-row">
        <label class="pp-label">Итого, ₸:</label>
        <input type="number" id="price-prompt-input" placeholder="необязательно" min="0" step="1" onfocus="this.select()" style="flex:1" />
      </div>
      <div class="price-prompt-btns">
        <button class="back-btn" onclick="skipPrice()">Пропустить</button>
        <button class="login-btn" onclick="confirmPrice()">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Модалка статистики -->
  <div id="stats-modal" class="modal-overlay hidden">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>📊 Статистика покупок</h2>
        <button class="modal-close" onclick="closeStats()">✕</button>
      </div>
      <div class="stats-periods">
        <button class="period-btn active" onclick="setStatsPeriod('today', this)">Сегодня</button>
        <button class="period-btn" onclick="setStatsPeriod('week', this)">7 дней</button>
        <button class="period-btn" onclick="setStatsPeriod('month', this)">30 дней</button>
        <button class="period-btn" onclick="setStatsPeriod('year', this)">Год</button>
        <button class="period-btn" onclick="setStatsPeriod('custom', this)">Свой</button>
      </div>
      <div id="custom-period" class="custom-period hidden">
        <input type="date" id="date-from" />
        <span>—</span>
        <input type="date" id="date-to" />
        <button class="period-apply-btn" onclick="renderStats()">Показать</button>
      </div>
      <div id="stats-content"></div>
    </div>
  </div>

  <!-- Основное приложение -->
  <div class="app hidden">
    <header>
      <div class="header-content">
        <h1>🛒 Our Grocery</h1>
        <div class="header-right">
          <button class="dark-toggle" onclick="toggleDark()">🌙</button>
          <div class="current-user-chip" onclick="logout()">
            <span id="current-user-display"></span>
            <span class="logout-hint">↩</span>
          </div>
        </div>
      </div>
      <div class="header-stats">
        <span id="stats-text">0 из 0 куплено</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </header>

    <main>
      <div class="add-section">
        <select id="category-select" onchange="updatePopular()"></select>
        <!-- Кнопки-чипы популярных товаров -->
        <div id="popular-items" class="popular-items"></div>
        <!-- Чекбокс "Стекло" — только для Напитков -->
        <div id="glass-option" class="glass-option hidden">
          <label class="glass-label">
            <input type="checkbox" id="glass-check" />
            <span class="glass-box">🍶</span>
            <span>Стекло</span>
          </label>
        </div>
        <!-- Поле ручного ввода -->
        <div class="input-wrap hidden" id="manual-wrap">
          <input type="text" id="item-input" placeholder="Введите название..." autocomplete="off" />
          <div id="autocomplete-list" class="autocomplete-list hidden"></div>
        </div>
        <div class="add-row2">
          <input type="number" id="qty-input" placeholder="Кол-во" min="1" value="1" onfocus="this.select()" onkeydown="if(event.key==='-')event.preventDefault()" />
          <select id="unit-select"></select>
          <button id="add-btn" onclick="addItem()">＋ Добавить</button>
        </div>
      </div>

      <div class="filters-bar">
        <div class="filters">
          <button class="filter-btn active" onclick="setFilter('active', this)">Не куплено</button>
          <button class="filter-btn" onclick="setFilter('done', this)">Куплено</button>
          <button class="filter-btn" onclick="setFilter('all', this)">Все</button>
        </div>
        <button class="stats-open-btn" onclick="openStats()" title="Статистика">📊</button>
      </div>

      <div id="list-container"></div>

      <div class="footer-actions" id="footer-actions">
        <button class="danger-btn" onclick="clearDone()">Удалить купленные</button>
        <button class="danger-btn" onclick="clearAll()">Очистить всё</button>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="app.js?v=14"></script>
</body>
</html>
